name: Build and Deploy Docker Image

on:
  push:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build \
          --build-arg DOMAIN=${{ secrets.DOMAIN }} \
          --build-arg BACKEND_URL=${{ secrets.BACKEND_URL }} \
          -t ${{ secrets.DOCKER_IMAGE_NAME }} .
          docker tag ${{ secrets.DOCKER_IMAGE_NAME }}:latest ${{ secrets.DOCKER_IMAGE_NAME }}:dev
          docker push ${{ secrets.DOCKER_IMAGE_NAME }}:dev

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy Docker Image on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |

            set -e  # 스크립트 실패 시 중단
  
            # 기존 컨테이너 확인 및 중지
            echo "'${{ secrets.DOCKER_IMAGE_NAME }}' 컨테이너가 존재하는지 확인 중입니다..."
            if sudo docker ps -a --filter "name=${{ secrets.DOCKER_IMAGE_NAME }}" --format '{{.Names}}' | grep -w ${{ secrets.DOCKER_IMAGE_NAME }}; then
              echo "'${{ secrets.DOCKER_IMAGE_NAME }}' 컨테이너가 실행 중입니다. 중지 및 제거합니다..."
              sudo docker stop ${{ secrets.DOCKER_IMAGE_NAME }}
              sudo docker rm ${{ secrets.DOCKER_IMAGE_NAME }}
            else
              echo "'${{ secrets.DOCKER_IMAGE_NAME }}' 컨테이너가 존재하지 않습니다. 중지 및 제거 단계를 건너뜁니다."
            fi

            echo "Docker Hub에 로그인 중..."
            echo "${{ secrets.DOCKER_HUB_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin

            # Docker Hub에서 최신 이미지 Pull
            echo "Docker Hub에서 최신 이미지를 가져오는 중입니다..."
            sudo docker pull ${{ secrets.DOCKER_IMAGE_NAME }}:dev

            # 새 컨테이너 실행
            echo "새 컨테이너를 시작합니다..."
            sudo docker run -d -p 80:80 --name ${{ secrets.DOCKER_IMAGE_NAME }} ${{ secrets.DOCKER_IMAGE_NAME }}:dev

            # 사용하지 않는 Docker 이미지 정리
            echo "사용하지 않는 Docker 이미지를 정리 중입니다..."
            sudo docker image prune -f

            # 배포 완료
            echo "배포가 성공적으로 완료되었습니다."